<section class="hero">
    <div class="container hero__container">
        <div class="hero__cta">
            <div class="hero__text">
                <div class="hero__title-wrapper">
                    <h1 class="hero__title">
                        Discover your favorite place <br> with us
                    </h1>
                    <!-- UNDERLINE -->
                    <svg class="hero__underline icon icon--underline">
                        <use href="./img/svgsprite/sprite.symbol.svg#underline"></use>
                    </svg>
                </div>

                <p class="hero__desc">
                    Your journey begins here with our curated travel experiences. Discover new horizons, create lasting
                    memories, and explore the world with our expertly crafted itineraries.
                </p>
            </div>

            <!-- FORM -->
            <form action="#" class="hero__booking">
                <!-- LOCATION -->
                <div class="hero__location">
                    
                    <div class="hero__input-group">
                        <span class="hero__label">Locations</span>
                        <input class="hero__input" type="text" list="countries-list" placeholder="e.g Bali, Indonesia">
                        <datalist id="countries-list">
                            <option value="Bali, Indonesia">
                            <option value="Kyiv, Ukraine">
                            <option value="Reykjavik, Iceland">
                            <option value="Paris, France">
                            <option value="Tokyo, Japan">
                            <option value="Male, Maldives">
                            <option value="Rome, Italy">
                            <option value="Barcelona, Spain">
                        </datalist>
                    </div>
                    
                </div>
                <!-- DATE -->
                <div class="hero__date" id="date-wrapper">
                    
                    <div class="hero__input-group">
                        <span class="hero__label">Date and time</span>
                        <input class="hero__input" type="text" id="datepicker-input" placeholder="MM/DD/YYYY">
                    </div>
                   
                </div>
                <!-- HERO BUTTON -->
                <button type="submit" class="hero__btn">
                    <svg class="hero__search-icon icon icon--search">
                        <use href="./img/svgsprite/sprite.symbol.svg#search"></use>
                    </svg>
                </button>
            </form>
        </div>

        <div class="hero__images">
            <div class="hero__img-main">
                <img src="./../../img/Subtract.png" alt="hero img">
            </div>
            <div class="hero__img-product">
                <a href=""><img src="./../../img/Product.png" alt="hero img"></a>
            </div>
            <div class="hero__scroll">
                <div class="hero__scroll-wrapper">
                    <img class="hero__scroll-text" src="./../../img/scroll-down-text.png" alt="">
                    <img class="hero__scroll-icon" src="./../../img/Component.png" alt="">
                </div>
            </div>
        </div>
    </div>
</section>
