<section class="newsletter">
    <div class="container newsletter__container">
        <div class="newsletter__row">

            <div class="newsletter__text-block">
                <h2 class="newsletter__title">Join our newsletter to stay up to date</h2>
                <p class="newsletter__subtitle">Stay connected with our brand</p>
            </div>

            <!-- FORM -->
            <form action="#" class="newsletter__form">
                <div class="newsletter__field">
                    <svg class="newsletter__icon icon icon--mail">
                        <use href="./img/svgsprite/sprite.symbol.svg#mail"></use>
                    </svg>
                    <input class="newsletter__input" type="email" placeholder="Enter your email" required>
                </div>

                <button type="submit" class="newsletter__button">
                    Subscribe
                </button>
            </form>

        </div>
    </div>
</section>
